name: Cron Jobs

# Schedules mirror what was in vercel.json but now run from GitHub Actions
# so they work on the Vercel Hobby (free) plan.
#
# All jobs hit the deployed app's API routes with a Bearer token.
# Required GitHub secret: CRON_SECRET  (same value as in Vercel env vars)
# Required GitHub secret: APP_URL      e.g. https://stellar-ai-network.vercel.app
#
# To add the secrets: GitHub repo → Settings → Secrets and variables → Actions

on:
  schedule:
    # ── due-check   every 6 hours at :00 ─────────────────────────────────
    - cron: "0 */6 * * *"
    # ── notify-due  every 6 hours at :05 ─────────────────────────────────
    - cron: "5 */6 * * *"
    # ── auto-execute every 6 hours at :10 ────────────────────────────────
    - cron: "10 */6 * * *"
    # ── analytics-rollup once a day at 00:20 UTC ─────────────────────────
    - cron: "20 0 * * *"

  # Allow manual trigger from the Actions UI for debugging
  workflow_dispatch:
    inputs:
      job:
        description: "Which cron route to trigger"
        required: true
        default: "due-check"
        type: choice
        options:
          - health
          - due-check
          - notify-due
          - auto-execute
          - analytics-rollup

# ── Shared helper ────────────────────────────────────────────────────────────
# Re-usable step that calls an endpoint and fails if it returns non-200.
# Both status code AND response body are printed before any exit.
# env must provide: APP_URL, CRON_SECRET, ENDPOINT (e.g. /api/cron/due-check)

jobs:
  # ── Health check (manual only, or run before each cron for diagnostics) ─────
  health:
    name: Cron — health check
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'health'
    steps:
      - name: Check /api/cron/health
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "==> GET $APP_URL/api/cron/health"
          BODY=$(curl -s -w "\n__STATUS__%{http_code}" \
            -X GET "$APP_URL/api/cron/health" \
            -H "Authorization: Bearer $CRON_SECRET")
          STATUS=$(echo "$BODY" | tail -1 | sed 's/__STATUS__//')
          echo "$BODY" | head -n -1 | python3 -m json.tool 2>/dev/null || echo "$BODY" | head -n -1
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi

  # ── Due-check (runs every 6 h at :00) ──────────────────────────────────────
  due-check:
    name: Cron — due-check
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'due-check' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '0 */6')
    steps:
      - name: Call /api/cron/due-check
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "==> GET $APP_URL/api/cron/due-check"
          BODY=$(curl -s -w "\n__STATUS__%{http_code}" \
            -X GET "$APP_URL/api/cron/due-check" \
            -H "Authorization: Bearer $CRON_SECRET")
          STATUS=$(echo "$BODY" | tail -1 | sed 's/__STATUS__//')
          echo "$BODY" | head -n -1 | python3 -m json.tool 2>/dev/null || echo "$BODY" | head -n -1
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Cron due-check returned $STATUS. Check body above for details."
            exit 1
          fi

  # ── Notify-due (runs every 6 h at :05) ─────────────────────────────────────
  notify-due:
    name: Cron — notify-due
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'notify-due' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '5 */6')
    steps:
      - name: Call /api/cron/notify-due
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "==> GET $APP_URL/api/cron/notify-due"
          BODY=$(curl -s -w "\n__STATUS__%{http_code}" \
            -X GET "$APP_URL/api/cron/notify-due" \
            -H "Authorization: Bearer $CRON_SECRET")
          STATUS=$(echo "$BODY" | tail -1 | sed 's/__STATUS__//')
          echo "$BODY" | head -n -1 | python3 -m json.tool 2>/dev/null || echo "$BODY" | head -n -1
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Cron notify-due returned $STATUS. Check body above for details."
            exit 1
          fi

  # ── Auto-execute (runs every 6 h at :10) ───────────────────────────────────
  auto-execute:
    name: Cron — auto-execute
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'auto-execute' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '10 */6')
    steps:
      - name: Call /api/cron/auto-execute
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "==> GET $APP_URL/api/cron/auto-execute"
          BODY=$(curl -s -w "\n__STATUS__%{http_code}" \
            -X GET "$APP_URL/api/cron/auto-execute" \
            -H "Authorization: Bearer $CRON_SECRET")
          STATUS=$(echo "$BODY" | tail -1 | sed 's/__STATUS__//')
          echo "$BODY" | head -n -1 | python3 -m json.tool 2>/dev/null || echo "$BODY" | head -n -1
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Cron auto-execute returned $STATUS. Check body above for details."
            exit 1
          fi

  # ── Analytics rollup (once a day at 00:20 UTC) ─────────────────────────────
  analytics-rollup:
    name: Cron — analytics-rollup
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'analytics-rollup' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '20 0')
    steps:
      - name: Call /api/cron/analytics-rollup
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "==> GET $APP_URL/api/cron/analytics-rollup"
          BODY=$(curl -s -w "\n__STATUS__%{http_code}" \
            -X GET "$APP_URL/api/cron/analytics-rollup" \
            -H "Authorization: Bearer $CRON_SECRET")
          STATUS=$(echo "$BODY" | tail -1 | sed 's/__STATUS__//')
          echo "$BODY" | head -n -1 | python3 -m json.tool 2>/dev/null || echo "$BODY" | head -n -1
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Cron analytics-rollup returned $STATUS. Check body above for details."
            exit 1
          fi
